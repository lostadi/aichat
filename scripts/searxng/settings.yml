use_default_settings: true

general:
  debug: false
  instance_name: "AIChat SearXNG"
  donations:
    patreon: false
    buymeacoffee: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "aichat_secure_key_2026" # Change this if exposing publicly!
  base_url: "http://localhost:8080/"
  limiter: false # Disable rate limiter for local use
  image_proxy: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    disabled: false
